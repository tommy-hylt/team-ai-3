<svg xmlns="http://www.w3.org/2000/svg" viewBox="100 100 312 312" width="512" height="512">
  <defs>
    <linearGradient id="theme" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0cd4cf" />
      <stop offset="100%" stop-color="#088c89" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g transform="translate(256, 256)">
    <!-- Connections -->
    <path d="M 0 -80 L -70 40 L 70 40 Z" fill="none" stroke="#0abab5" stroke-opacity="0.3" stroke-width="12" stroke-linejoin="round" />
    <path d="M 0 -80 L 0 0" fill="none" stroke="#0abab5" stroke-opacity="0.5" stroke-width="8" stroke-linecap="round" />
    <path d="M -70 40 L 0 0" fill="none" stroke="#0abab5" stroke-opacity="0.5" stroke-width="8" stroke-linecap="round" />
    <path d="M 70 40 L 0 0" fill="none" stroke="#0abab5" stroke-opacity="0.5" stroke-width="8" stroke-linecap="round" />

    <!-- Core / Hub -->
    <circle cx="0" cy="0" r="28" fill="#ffffff" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="10" fill="#0a0c0f" />

    <!-- Node 1 (Top) -->
    <circle cx="0" cy="-80" r="40" fill="url(#theme)" filter="url(#glow)"/>
    <circle cx="-12" cy="-85" r="4" fill="#0a0c0f" />
    <circle cx="12" cy="-85" r="4" fill="#0a0c0f" />
    <path d="M -10 -72 Q 0 -66 10 -72" fill="none" stroke="#0a0c0f" stroke-width="4" stroke-linecap="round"/>

    <!-- Node 2 (Bottom Left) -->
    <circle cx="-70" cy="40" r="32" fill="url(#theme)" filter="url(#glow)"/>
    <circle cx="-80" cy="38" r="3" fill="#0a0c0f" />
    <circle cx="-60" cy="38" r="3" fill="#0a0c0f" />
    <path d="M -78 48 Q -70 52 -62 48" fill="none" stroke="#0a0c0f" stroke-width="3" stroke-linecap="round"/>

    <!-- Node 3 (Bottom Right) -->
    <circle cx="70" cy="40" r="32" fill="url(#theme)" filter="url(#glow)"/>
    <circle cx="60" cy="38" r="3" fill="#0a0c0f" />
    <circle cx="80" cy="38" r="3" fill="#0a0c0f" />
    <path d="M 62 48 Q 70 52 78 48" fill="none" stroke="#0a0c0f" stroke-width="3" stroke-linecap="round"/>

    <!-- Orbital elements to make it look techy -->
    <circle cx="100" cy="-100" r="8" fill="#0abab5" opacity="0.6" />
    <circle cx="-120" cy="-40" r="6" fill="#0abab5" opacity="0.6" />
    <circle cx="40" cy="120" r="10" fill="#0abab5" opacity="0.6" />
  </g>
</svg>
